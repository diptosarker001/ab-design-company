<!DOCTYPE html>
<html>
<head>
    <title>AB Design - Admin Panel</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        input, textarea, button { width: 100%; margin: 10px 0; padding: 10px; }
        .preview { max-width: 200px; margin: 10px 0; }
        .message { padding: 10px; margin: 10px 0; display: none; }
        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>
    <h2>📤 ডিজাইন আপলোড</h2>
    
    <div id="message" class="message"></div>
    
    <form id="uploadForm">
        <input type="text" id="token" placeholder="GitHub Personal Access Token" required>
        <input type="text" id="designName" placeholder="ডিজাইনের নাম" required>
        <select id="category" required>
            <option value="">ক্যাটাগরি নির্বাচন করুন</option>
            <option value="logo">লোগো ডিজাইন</option>
            <option value="banner">সোশ্যাল মিডিয়া ব্যানার</option>
            <option value="card">বিজনেস কার্ড</option>
        </select>
        <input type="file" id="imageFile" accept="image/*" required>
        <img id="preview" class="preview" style="display: none;">
        <button type="submit">আপলোড করুন</button>
    </form>

    <script>
        const GITHUB_USERNAME = 'diptosarker001';
        const REPO_NAME = 'ab-design-company';
        const BRANCH = 'main';

        document.getElementById('imageFile').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('preview').style.display = 'block';
                document.getElementById('preview').src = e.target.result;
            }
            reader.readAsDataURL(this.files[0]);
        });

        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const messageDiv = document.getElementById('message');
            messageDiv.className = 'message';
            messageDiv.textContent = 'আপলোড হচ্ছে...';
            messageDiv.style.display = 'block';

            try {
                const token = document.getElementById('token').value;
                const designName = document.getElementById('designName').value;
                const category = document.getElementById('category').value;
                const imageFile = document.getElementById('imageFile').files[0];

                // ফাইলকে Base64 তে কনভার্ট করুন
                const reader = new FileReader();
                reader.readAsDataURL(imageFile);
                
                reader.onload = async function() {
                    const base64Data = reader.result.split(',')[1];
                    
                    // ইউনিক ফাইলনেম তৈরি
                    const timestamp = Date.now();
                    const filename = `designs/${category}/${timestamp}-${imageFile.name}`;
                    
                    // GitHub API কল
                    const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${filename}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            message: `Add new design: ${designName}`,
                            content: base64Data,
                            branch: BRANCH
                        })
                    });

                    if (!response.ok) throw new Error('আপলোড ব্যর্থ হয়েছে');

                    const data = await response.json();
                    
                    // ডিজাইনের তথ্য products.json এ সেভ করুন
                    await updateProductsJson(designName, category, data.content.download_url, token);
                    
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ ডিজাইন সফলভাবে আপলোড হয়েছে!';
                    
                    // ফর্ম রিসেট
                    document.getElementById('uploadForm').reset();
                    document.getElementById('preview').style.display = 'none';
                };
                
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ ' + error.message;
            }
        });

        async function updateProductsJson(designName, category, imageUrl, token) {
            try {
                // প্রথমে current products.json পড়ুন
                const getResponse = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/products.json?ref=${BRANCH}`);
                let products = [];
                let sha = null;
                
                if (getResponse.ok) {
                    const fileData = await getResponse.json();
                    sha = fileData.sha;
                    const content = atob(fileData.content);
                    products = JSON.parse(content);
                }
                
                // নতুন ডিজাইন যোগ করুন
                products.push({
                    id: Date.now(),
                    name: designName,
                    category: category,
                    image: imageUrl,
                    date: new Date().toISOString()
                });
                
                // আপডেট করা products.json আপলোড করুন
                await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/products.json`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: `Update products.json with new ${category}`,
                        content: btoa(JSON.stringify(products, null, 2)),
                        sha: sha,
                        branch: BRANCH
                    })
                });
            } catch (error) {
                console.error('products.json update error:', error);
            }
        }
    </script>
</body>
</html>
